; ─── Intercom dialplan ────────────────────────────────────────────────────────
[general]
static=yes
writeprotect=no

[intercom]
; =============================================================================
; Дверная панель 1002 (192.168.50.31) звонит на экстеншн 1001
; → соединяем с монитором 1001 (192.168.50.100)
; =============================================================================
exten => 1001,1,NoOp(Call from ${CALLERID(num)} to 1001)
; Если звонит панель 1002 → вызываем монитор 1001
exten => 1001,n,GotoIf($["${CALLERID(num)}" = "1002"]?ring_monitor:ring_door)
exten => 1001,n(ring_monitor),Dial(PJSIP/1001,30,g)
exten => 1001,n,Hangup()
exten => 1001,n(ring_door),Dial(PJSIP/1002,30,g)
exten => 1001,n,Hangup()

; =============================================================================
; Монитор 1001 (192.168.50.100) звонит на экстеншн 1002
; → соединяем с дверной панелью 1002 (192.168.50.31)
; =============================================================================
exten => 1002,1,NoOp(Call from ${CALLERID(num)} to 1002)
; Если звонит монитор 1001 → вызываем панель 1002
exten => 1002,n,GotoIf($["${CALLERID(num)}" = "1001"]?ring_door:ring_monitor)
exten => 1002,n(ring_door),Dial(PJSIP/1002,30,g)
exten => 1002,n,Hangup()
exten => 1002,n(ring_monitor),Dial(PJSIP/1001,30,g)
exten => 1002,n,Hangup()

; Fallback — сбрасываем всё остальное
exten => _X.,1,Hangup()
exten => _XX.,1,Hangup()

[from-internal]
include => intercom
