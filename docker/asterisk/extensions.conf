[general]
static=yes
writeprotect=no

[intercom]

; === Квартира 1003: 1099, 1003 ===
exten => 1003,1,NoOp(Incoming call to 1003 from ${CALLERID(num)})
exten => 1003,n,Set(CALL_UID=${UNIQUEID})
exten => 1003,n,Set(UNUSED=${CURL(http://127.0.0.1:8000/api/webhooks/asterisk?event=call_start&caller=${CALLERID(num)}&callee=1003&call_id=${CALL_UID})})
exten => 1003,n,Set(JITTERBUFFER(adaptive)=default)
exten => 1003,n,Dial(PJSIP/1099&PJSIP/1003,60,g)
exten => 1003,n,Set(UNUSED=${CURL(http://127.0.0.1:8000/api/webhooks/asterisk?event=call_end&caller=${CALLERID(num)}&call_id=${CALL_UID})})
exten => 1003,n,Hangup()

