; ─── Intercom dialplan ────────────────────────────────────────────────────────
[general]
static=yes
writeprotect=no

[intercom]
; =============================================================================
; Дверная панель 1002 (192.168.50.31) звонит на экстеншн 1001
; → соединяем с монитором 1001 (192.168.50.100)
; =============================================================================
exten => 1001,1,NoOp(Call from ${CALLERID(num)} to 1001)
exten => 1001,n,Set(CALL_UID=${UNIQUEID})
exten => 1001,n,GotoIf($["${CALLERID(num)}" = "1002"]?from_door:ring_door)

; Звонок с дверной панели → браузер и монитор одновременно (60 сек)
; Кто первый ответит — тот берёт звонок, остальным Asterisk шлёт CANCEL
exten => 1001,n(from_door),Set(DOOR_CALL_UID=${CALL_UID})
exten => 1001,n,Set(UNUSED=${CURL(http://127.0.0.1:8000/api/webhooks/asterisk?event=call_start&caller=1002&callee=1001&call_id=${DOOR_CALL_UID})})
; JITTERBUFFER — сглаживает RTP-поток от дверной панели (clock drift, сетевой джиттер)
exten => 1001,n,Set(JITTERBUFFER(adaptive)=default)
exten => 1001,n,Dial(PJSIP/1099&PJSIP/1001,60,g)
exten => 1001,n(call_done),Set(UNUSED=${CURL(http://127.0.0.1:8000/api/webhooks/asterisk?event=call_end&caller=1002&call_id=${DOOR_CALL_UID})})
exten => 1001,n,Set(DOOR_CALL_UID=)
exten => 1001,n,Hangup()

exten => 1001,n(ring_door),Dial(PJSIP/1002,30,g)
exten => 1001,n,Hangup()

; =============================================================================
; Монитор 1001 (192.168.50.100) звонит на экстеншн 1002
; → соединяем с дверной панелью 1002 (192.168.50.31)
; =============================================================================
exten => 1002,1,NoOp(Call from ${CALLERID(num)} to 1002)
exten => 1002,n,GotoIf($["${CALLERID(num)}" = "1001"]?ring_door:ring_monitor)
exten => 1002,n(ring_door),Set(JITTERBUFFER(adaptive)=default)
exten => 1002,n(ring_door_dial),Dial(PJSIP/1002,30,g)
exten => 1002,n,Hangup()
exten => 1002,n(ring_monitor),Set(JITTERBUFFER(adaptive)=default)
exten => 1002,n,Dial(PJSIP/1001,30,g)
exten => 1002,n,Hangup()

; Hangup — страховка если вызывающий сбросил до завершения Dial
exten => h,1,GotoIf($["${DOOR_CALL_UID}" = ""]?done:notify)
exten => h,n(notify),Set(UNUSED=${CURL(http://127.0.0.1:8000/api/webhooks/asterisk?event=call_end&caller=1002&call_id=${DOOR_CALL_UID})})
exten => h,n(done),NoOp(Hangup complete)


