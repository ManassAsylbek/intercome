; ─── Intercom dialplan — generated by intercom-server ─────────────────────────
; DO NOT EDIT MANUALLY — изменения перезапишутся автоматически.
; Управляйте квартирами через веб-интерфейс → Квартиры.

[general]
static=yes
writeprotect=no

; Маршруты квартир (генерируется бэкендом автоматически при добавлении мониторов)
#include "extensions_apartments.conf"

[intercom]
; Все звонки на номера квартир делегируются в [intercom-apartments],
; который перегенерируется backend'ом по set_apartment_monitors из cloud.
include => intercom-apartments

; AMI events DialBegin/DialEnd/Hangup доставляют call_started/call_ended
; в backend → cloud WS, поэтому CURL-вебхуки в dialplan не нужны.

; Hangup handler — финальный no-op
exten => h,1,NoOp(Hangup: ${CALLERID(num)})
