[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
; network_mode: host — Asterisk напрямую на IP хоста 192.168.50.132
; external_ адреса не нужны, локальные сети тоже не нужны

; Глобальные настройки — запрещаем direct media глобально
[global]
type=global
max_forwards=70
default_from_user=intercom
keep_alive_interval=30
user_agent=Asterisk

; === managed by intercom-server: 1001 ===
[1001]
type=endpoint
context=intercom
disallow=all
allow=alaw
allow=ulaw
auth=auth1001
aors=1001
direct_media=no
rtp_symmetric=yes
force_rport=yes
ice_support=no
rewrite_contact=yes
media_use_received_transport=yes
dtmf_mode=rfc4733
rtcp_mux=no
allow_transfer=no
send_rpid=yes
trust_id_inbound=yes
rtp_timeout=30
rtp_timeout_hold=60
transport=transport-udp

[auth1001]
type=auth
auth_type=userpass
username=1001
password=StrongPass1001

[1001]
type=aor
max_contacts=1
remove_existing=yes
qualify_frequency=30
; === end managed 1001 ===

