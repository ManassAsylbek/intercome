version: "3.9"

# Скопируйте .env.example → .env и задайте SERVER_IP перед запуском:
#   cp .env.example .env
#   docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: intercom-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-intercom}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-intercom}
      - POSTGRES_DB=${POSTGRES_DB:-intercom}
    volumes:
      - intercom-pg:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-intercom} -d ${POSTGRES_DB:-intercom}"]
      interval: 10s
      timeout: 5s
      retries: 5

  asterisk:
    image: andrius/asterisk:latest
    container_name: intercom-asterisk
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./docker/asterisk/pjsip.conf:/etc/asterisk/pjsip.conf
      - ./docker/asterisk/extensions.conf:/etc/asterisk/extensions.conf
      - ./docker/asterisk/asterisk.conf:/etc/asterisk/asterisk.conf
      - ./docker/asterisk/manager.conf:/etc/asterisk/manager.conf
      - ./docker/asterisk/rtp.conf:/etc/asterisk/rtp.conf
      - ./docker/asterisk/http.conf:/etc/asterisk/http.conf
      - ./docker/asterisk/pjsip_webrtc.conf:/etc/asterisk/pjsip_webrtc.conf
      - ./docker/asterisk/extensions_apartments.conf:/etc/asterisk/extensions_apartments.conf
    healthcheck:
      test: ["CMD", "asterisk", "-rx", "core show version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: intercom-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_SECRET_KEY=${APP_SECRET_KEY:-change-me-32-chars-minimum-here!}
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://intercom:intercom@postgres:5432/intercom}
      - APP_CORS_ORIGINS=${APP_CORS_ORIGINS:-http://localhost,http://localhost:80}
      - SERVER_IP=${SERVER_IP:-127.0.0.1}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - ASTERISK_MODE=${ASTERISK_MODE:-ami}
      - ASTERISK_PJSIP_CONF=${ASTERISK_PJSIP_CONF:-/etc/asterisk/pjsip.conf}
      - ASTERISK_EXTENSIONS_CONF=${ASTERISK_EXTENSIONS_CONF:-/etc/asterisk/extensions.conf}
      - ASTERISK_RELOAD_CMD=${ASTERISK_RELOAD_CMD:-}
      - ASTERISK_SSH_HOST=${ASTERISK_SSH_HOST:-}
      - ASTERISK_SSH_PORT=${ASTERISK_SSH_PORT:-22}
      - ASTERISK_SSH_USER=${ASTERISK_SSH_USER:-}
      - ASTERISK_SSH_KEY_FILE=${ASTERISK_SSH_KEY_FILE:-}
      - ASTERISK_AMI_HOST=${ASTERISK_AMI_HOST:-asterisk-host}
      - ASTERISK_AMI_PORT=${ASTERISK_AMI_PORT:-5038}
      - ASTERISK_AMI_USER=${ASTERISK_AMI_USER:-intercom}
      - ASTERISK_AMI_SECRET=${ASTERISK_AMI_SECRET:-intercom-ami-secret}
      # Cloud WebSocket bridge (optional — leave empty to disable)
      - CLOUD_WS_URL=${CLOUD_WS_URL:-}
      - CLOUD_BRIDGE_TOKEN=${CLOUD_BRIDGE_TOKEN:-}
      - CLOUD_SIP_TRUNK_ENDPOINT=${CLOUD_SIP_TRUNK_ENDPOINT:-}
      # WebRTC STUN URL returned to mobile clients in provision_webrtc_endpoint ack
      - INTERCOM_STUN_URL=${INTERCOM_STUN_URL:-stun:${SERVER_IP:-127.0.0.1}:3478}
      - INTERCOM_PUBLIC_BASE_URL=${INTERCOM_PUBLIC_BASE_URL:-}
      - PUBLIC_BRIDGE_HOST=${PUBLIC_BRIDGE_HOST:-}
      - GO2RTC_USER=${GO2RTC_USER:-}
      - GO2RTC_PASS=${GO2RTC_PASS:-}
      - GO2RTC_CONFIG_PATH=/go2rtc_config/go2rtc.yaml
      - COTURN_PUBLIC_HOST=${COTURN_PUBLIC_HOST:-}
      - COTURN_PORT=${COTURN_PORT:-3478}
      - COTURN_USER=${COTURN_USER:-}
      - COTURN_CRED=${COTURN_CRED:-}
      - COTURN_SECRET=${COTURN_SECRET:-changeme-turn-secret}
      - SIP_WS_URL=${SIP_WS_URL:-}
      - SIP_DOMAIN=${SIP_DOMAIN:-}
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "asterisk-host:host-gateway"
      - "host.docker.internal:host-gateway"
    volumes:
      - intercom-data:/app/data
      - ./docker/asterisk/pjsip.conf:/etc/asterisk/pjsip.conf # shared with asterisk
      - ./docker/asterisk/extensions.conf:/etc/asterisk/extensions.conf # shared with asterisk
      - ./docker/asterisk/pjsip_webrtc.conf:/etc/asterisk/pjsip_webrtc.conf # backend writes, asterisk reads
      - ./docker/asterisk/extensions_apartments.conf:/etc/asterisk/extensions_apartments.conf # backend writes, asterisk reads
      - /var/run/docker.sock:/var/run/docker.sock # для asterisk reload
      - ./docker/bin/docker:/usr/local/bin/docker:ro # linux docker CLI
      - ./docker/go2rtc:/go2rtc_config  # backend writes go2rtc.yaml here
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # nginx проксирует /api/ → backend, VITE_API_URL не нужен в prod
        - VITE_API_URL=
    container_name: intercom-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
      - "443:443"
    extra_hosts:
      # nginx проксирует /sip и /asterisk/ws на Asterisk (host network) и
      # /go2rtc/ на go2rtc (host network). host.docker.internal указывает
      # на хост, у которого реальный IP не привязан к конкретному значению.
      - "host.docker.internal:host-gateway"
    volumes:
      - ./docker/nginx/server.crt:/etc/nginx/ssl/server.crt:ro
      - ./docker/nginx/server.key:/etc/nginx/ssl/server.key:ro
    depends_on:
      backend:
        condition: service_healthy

  # Local STUN server — браузер получает реальный LAN-IP в ICE-кандидатах
  # (без него HTTPS-страница даёт mDNS *.local кандидаты, которые Asterisk не резолвит)
  coturn:
    image: coturn/coturn:latest
    container_name: intercom-coturn
    restart: unless-stopped
    network_mode: host
    environment:
      - COTURN_SECRET=${COTURN_SECRET:-changeme-turn-secret}
    command: >
      -n
      --no-tls
      --no-dtls
      --use-auth-secret
      --static-auth-secret=${COTURN_SECRET:-changeme-turn-secret}
      --realm=intercom
      --log-file=stdout
      --listening-port=3478

  go2rtc:
    image: alexxit/go2rtc:latest
    container_name: intercom-go2rtc
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./docker/go2rtc/go2rtc.yaml:/config/go2rtc.yaml

volumes:
  intercom-data:
    driver: local
  intercom-pg:
    driver: local
